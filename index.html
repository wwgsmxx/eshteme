<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Беташар Тап - Наурыз ойыны</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --color-primary: #2E7D32;
            --color-accent: #76C94D;
            --color-gold: #C5A059;
            --color-bg: #FDFBF7;
            --color-text: #1B3C11;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Beautiful Koshkar Muiz and Shanyrak inspired background */
        .pattern-bg {
            background-color: var(--color-bg);
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 0C70 20 90 20 100 0M20 0C30 20 50 20 60 0M-20 0C-10 20 10 20 20 0M60 120C50 100 30 100 20 120M100 120C90 100 70 100 60 120M140 120C130 100 110 100 100 120' stroke='%23C5A059' fill='none' stroke-opacity='0.08' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-attachment: fixed;
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px -10px rgba(45, 79, 30, 0.1);
        }

        /* Ambient glowing orbs in background */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            pointer-events: none;
        }
        .orb-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, #76C94D, transparent);
            animation: float 15s ease-in-out infinite alternate;
        }
        .orb-2 {
            bottom: -10%; right: -10%;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, #C5A059, transparent);
            animation: float 20s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.95); }
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0) scale(0.98); }
            20% { transform: translateX(-6px) scale(0.98); }
            40% { transform: translateX(6px) scale(0.98); }
            60% { transform: translateX(-4px) scale(0.98); }
            80% { transform: translateX(4px) scale(0.98); }
        }
        .animate-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(118, 201, 77, 0.6); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(118, 201, 77, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(118, 201, 77, 0); }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(197, 160, 89, 0.4);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(197, 160, 89, 0.8);
        }

        /* Shimmer effect for buttons */
        .shimmer-bg {
            position: relative;
            overflow: hidden;
        }
        .shimmer-bg::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.1) 40%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(30deg);
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }
    </style>
</head>
<body class="pattern-bg min-h-screen relative">
    <!-- Ambient Background Lighting -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div id="root"></div>
    
    <script type="text/babel" data-type="module" src="app.tsx"></script>
</body>
</html>
